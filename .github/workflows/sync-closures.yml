name: Sync closures.json from Bamboo SKU Intelligence

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-closures.yml'

permissions:
  contents: write

concurrency:
  group: sync-closures
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream closures.json
        run: |
          mkdir -p data
          # Track whether ANY fetch succeeded — without this, an existing
          # data/closures.json from checkout would keep the job green even
          # when both sources fail, and the league would serve stale data.
          FETCHED=0
          # Only the raw github source is reliable here. The vercel.app
          # fallback is gated by the password middleware and always 401s.
          for URL in \
            "https://raw.githubusercontent.com/robertmckinley-alt/bamboo-sku-intelligence/main/data/closures.json"
          do
            echo "trying $URL"
            if curl -sLf --compressed -m 30 -o data/closures.json.new "$URL"; then
              if python3 -c "import json; json.load(open('data/closures.json.new'))" 2>/dev/null; then
                mv data/closures.json.new data/closures.json
                FETCHED=1
                echo "✓ fetched from $URL"
                break
              fi
            fi
            rm -f data/closures.json.new
          done
          if [ "$FETCHED" != "1" ]; then
            echo "::error::no upstream source returned valid JSON — failing run"
            exit 1
          fi
          ls -la data/closures.json

      - name: Commit if changed
        run: |
          git config user.name  "closures-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/closures.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            COUNT=$(python3 -c "import json; d=json.load(open('data/closures.json')); rows=d.get('rows') if isinstance(d, dict) else d; print(len(rows))")
            git commit -m "sync: closures.json (${COUNT} rows) [skip ci]"
            git push
          fi
