<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#047857" />
<title>Bamboo Closures League</title>
<link rel="icon" type="image/png" href="favicon.png" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<style>
:root {
  --ink-950:#0b1220; --ink-900:#111827; --ink-800:#1f2937;
  --ink-700:#374151; --ink-600:#4b5563; --ink-500:#6b7280;
  --ink-400:#9ca3af; --ink-300:#d1d5db; --ink-200:#e5e7eb;
  --ink-100:#f3f4f6; --ink-50:#f8fafc;
  --em-700:#047857; --em-600:#059669; --em-500:#10b981;
  --em-400:#34d399; --em-200:#a7f3d0; --em-100:#d1fae5; --em-50:#ecfdf5;
  --pos:#059669; --warn:#d97706; --alert:#dc2626; --info:#2563eb;
  --gold:#eab308; --plat:#a78bfa;
  --canvas:#f5f6f8; --paper:#fff; --line:#e5e7eb; --line-soft:#eef0f3;
}
html,body,#root{background:var(--canvas);height:100%;margin:0;}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
     font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;color:var(--ink-900);}
.font-display{font-family:"Fraunces","Source Serif Pro",Georgia,serif;font-feature-settings:"ss01","ss02";letter-spacing:-0.01em;}
.font-mono,.tabular-nums{font-family:"JetBrains Mono","SF Mono","Menlo","Consolas",ui-monospace,monospace;font-variant-numeric:tabular-nums;}
.small-caps{font-variant:small-caps;letter-spacing:0.08em;text-transform:lowercase;}

.emerald-grad{background:linear-gradient(135deg,#059669 0%,#047857 100%);}
.ink-grad{background:linear-gradient(135deg,#1f2937 0%,#0b1220 100%);}
.gold-grad{background:linear-gradient(135deg,#fbbf24 0%,#b45309 100%);}
.plat-grad{background:linear-gradient(135deg,#a78bfa 0%,#7c3aed 100%);}
.fire-grad{background:linear-gradient(135deg,#fb923c 0%,#dc2626 100%);}
.score-grad-high{background:linear-gradient(90deg,#34d399 0%,#059669 100%);}
.score-grad-mid{background:linear-gradient(90deg,#fbbf24 0%,#d97706 100%);}
.score-grad-low{background:linear-gradient(90deg,#f87171 0%,#dc2626 100%);}

.canvas-grain{background-image:radial-gradient(circle at 1px 1px,rgba(15,23,42,0.035) 1px,transparent 0);background-size:24px 24px;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;transition:all .12s ease;border:1px solid transparent;white-space:nowrap;cursor:pointer;}
.btn-primary{background:var(--ink-900);color:#fff;border-color:var(--ink-900);}
.btn-primary:hover{background:var(--ink-800);box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 2px 6px rgba(11,18,32,.18);}
.btn-emerald{background:linear-gradient(135deg,var(--em-600),var(--em-700));color:#fff;border-color:var(--em-700);}
.btn-emerald:hover{box-shadow:0 2px 8px rgba(5,150,105,.28),0 1px 0 rgba(255,255,255,.18) inset;}
.btn-ghost{background:#fff;color:var(--ink-700);border-color:var(--ink-200);}
.btn-ghost:hover{background:var(--ink-50);border-color:var(--ink-300);}
.btn-soft{background:var(--ink-100);color:var(--ink-800);}
.btn-soft:hover{background:var(--ink-200);}
.btn:active{transform:translateY(0.5px);}

.pill{display:inline-flex;align-items:center;gap:5px;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:600;height:20px;line-height:1;border:1px solid transparent;letter-spacing:0.02em;white-space:nowrap;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);}
.pill .dot{width:5px;height:5px;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,.5);}
.pill-lg{height:24px;padding:1px 10px;font-size:11px;}

table.dt{border-collapse:separate;border-spacing:0;width:100%;}
table.dt th{position:sticky;top:0;background:var(--ink-50);border-bottom:1px solid var(--ink-200);padding:7px 8px;font-size:10px;font-weight:600;color:var(--ink-600);text-transform:uppercase;letter-spacing:0.05em;user-select:none;z-index:5;text-align:left;}
table.dt th.sortable{cursor:pointer;}
table.dt th.sortable:hover{background:var(--ink-100);color:var(--ink-900);}
table.dt tbody tr{background:#fff;transition:background .08s ease;}
table.dt tbody tr:nth-child(even){background:#fafbfc;}
table.dt tbody tr:hover{background:#ecfdf5;}
table.dt tbody tr.selected{background:#d1fae5 !important;outline:1px solid var(--em-500);outline-offset:-1px;}
table.dt tbody tr.flash-leader{animation:flashLeader 1.6s ease-out;}
table.dt td{padding:6px 8px;border-bottom:1px solid var(--line-soft);font-size:11px;color:var(--ink-800);}

input[type="text"],input[type="search"],input[type="date"],input[type="number"],select{background:#fff;border:1px solid var(--ink-200);border-radius:6px;padding:5px 9px;font-size:12px;transition:border-color .1s,box-shadow .1s;}
input[type="text"]:focus,input[type="search"]:focus,input[type="date"]:focus,input[type="number"]:focus,select:focus{border-color:var(--em-500);box-shadow:0 0 0 3px rgba(16,185,129,.12);outline:none;}

input[type=range]{-webkit-appearance:none;height:4px;background:linear-gradient(90deg,var(--em-500),var(--em-700));border-radius:999px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--ink-900);box-shadow:0 1px 3px rgba(0,0,0,.18);cursor:grab;margin-top:-5px;}

@keyframes drawerIn{from{transform:translateX(20px);opacity:.4;}to{transform:translateX(0);opacity:1;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUpIn{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.drawer-anim{animation:drawerIn .22s ease-out;}
.backdrop-anim{animation:fadeIn .15s ease-out;}
.slide-up{animation:slideUpIn .25s cubic-bezier(.2,.7,.2,1);}

@keyframes shimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
.shimmer{background:linear-gradient(90deg,#eef0f3 0%,#f8fafc 50%,#eef0f3 100%);background-size:800px 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:4px;}

@keyframes flashLeader{
  0%{background:#fff7d0;transform:scale(1);}
  20%{background:#fef08a;transform:scale(1.005);box-shadow:inset 0 0 0 2px #eab308;}
  100%{background:#fff;transform:scale(1);}
}
@keyframes rankPulse{0%{box-shadow:0 0 0 0 rgba(234,179,8,.6);}100%{box-shadow:0 0 0 14px rgba(234,179,8,0);}}
.rank-pulse{animation:rankPulse 1.6s ease-out;}

@keyframes liveBlink{0%,100%{opacity:1;}50%{opacity:.35;}}
.live-dot{width:6px;height:6px;border-radius:50%;background:#dc2626;animation:liveBlink 1.2s ease-in-out infinite;display:inline-block;}

@keyframes flicker{0%,100%{filter:hue-rotate(-6deg) brightness(1);}50%{filter:hue-rotate(8deg) brightness(1.12);}}
.flicker{animation:flicker 1.2s ease-in-out infinite;display:inline-block;}

@keyframes bannerIn{from{transform:translateY(-100%);opacity:0;}50%{transform:translateY(8px);opacity:1;}to{transform:translateY(0);opacity:1;}}
@keyframes bannerOut{to{transform:translateY(-100%);opacity:0;}}
.banner-in{animation:bannerIn .42s cubic-bezier(.34,1.56,.64,1);}
.banner-out{animation:bannerOut .35s ease-in forwards;}

@keyframes crownGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(234,179,8,.6));}50%{filter:drop-shadow(0 0 10px rgba(234,179,8,.95));}}
.crown-glow{animation:crownGlow 2.1s ease-in-out infinite;}

@keyframes numUp{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.num-up{animation:numUp .25s ease-out;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:5px;border:2px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:#9ca3af;background-clip:padding-box;border:2px solid transparent;}

button:focus-visible,input:focus-visible,select:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--em-500);outline-offset:1px;}

.appbar{box-shadow:0 1px 0 rgba(15,23,42,.04);}
@media (max-width:1279px){.main-stack{flex-direction:column!important;}.rail-stack{width:100%!important;border-left:none!important;border-top:1px solid var(--line);}}

.bcard{background:#fff;border:1px solid var(--ink-200);border-radius:8px;overflow:hidden;box-shadow:0 1px 0 rgba(15,23,42,.04);}
.bcard-header{padding:12px 16px;border-bottom:1px solid var(--ink-200);background:var(--ink-50);}

.goalbar{height:8px;border-radius:999px;overflow:hidden;background:var(--ink-100);position:relative;}
.goalbar > div{height:100%;border-radius:999px;transition:width .4s cubic-bezier(.2,.7,.2,1);}
.goalbar.tall{height:14px;}

.throne{background:linear-gradient(90deg,#fff7d0 0%,#fef08a 60%,#fff7d0 100%);border-left:3px solid #eab308;}
.throne td:first-child{font-weight:700;color:#854d0e;}

.confetti-host{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden;}

@media print{
  .no-print{display:none!important;}
  header.appbar,aside.rail{display:none!important;}
  body,html,#root{background:#fff!important;}
}

.feed-item{border-left:2px solid var(--ink-200);padding:6px 10px;font-size:11px;background:#fff;animation:slideUpIn .25s ease-out;}
.feed-item.feed-fire{border-left-color:#dc2626;background:#fff7ed;}
.feed-item.feed-leader{border-left-color:#eab308;background:#fefce8;}
.feed-item.feed-team{border-left-color:#10b981;background:#ecfdf5;}
.feed-item.feed-badge{border-left-color:#a78bfa;background:#f5f3ff;}

.badge-tile{position:relative;width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 1px 0 rgba(15,23,42,.04),inset 0 1px 0 rgba(255,255,255,.18);}
.badge-tile.locked{filter:grayscale(1) opacity(.35);}

/* ============================================================================
 *  MOBILE  ·  ≤ 639px  — phone layout
 * ============================================================================ */
@media (max-width:639px){
  .hide-sm{display:none!important;}

  /* AppBar */
  header.appbar{padding:6px 10px!important;gap:8px!important;flex-wrap:wrap;}
  header.appbar h1{font-size:15px!important;}
  header.appbar nav{order:99;flex-basis:100%;overflow-x:auto;scrollbar-width:none;padding:4px 10px;margin:0 -10px;-webkit-overflow-scrolling:touch;}
  header.appbar nav::-webkit-scrollbar{display:none;}
  header.appbar nav button{flex-shrink:0;padding:8px 14px!important;font-size:12px!important;}

  /* Period strip scrollable */
  body .px-4.py-2.bg-white{padding-left:10px!important;padding-right:10px!important;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;}

  /* Larger touch targets */
  .btn{padding:8px 12px!important;font-size:12px!important;min-height:36px;}
  .pill{height:22px;padding:2px 10px;font-size:11px;}
  input[type="text"],input[type="search"],input[type="date"],input[type="number"],select{padding:8px 10px!important;font-size:14px!important;min-height:36px;}

  /* KPI grids → 2 columns */
  .grid.md\:grid-cols-5,.grid.md\:grid-cols-4,.grid.lg\:grid-cols-7,.grid.md\:grid-cols-3{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important;}

  /* TABLES → card list */
  table.dt{display:block;}
  table.dt thead{display:none;}
  table.dt tbody{display:block;}
  table.dt tbody tr{
    display:grid;grid-template-columns:auto 1fr auto;gap:4px 12px;
    padding:12px 14px;
    border:1px solid var(--ink-200);border-radius:10px;
    background:#fff!important;margin-bottom:8px;
    box-shadow:0 1px 0 rgba(15,23,42,.04);
  }
  table.dt tbody tr:nth-child(even){background:#fff!important;}
  table.dt tbody tr.throne{
    background:linear-gradient(90deg,#fff7d0 0%,#fef08a 60%,#fff7d0 100%)!important;
    border:2px solid #eab308!important;border-left-width:4px!important;
  }
  table.dt tbody tr.flash-leader{outline:2px solid #eab308;}
  table.dt td{display:block;padding:2px 0;border:none;font-size:13px;line-height:1.3;}
  table.dt td:nth-child(1){grid-column:1/2;grid-row:1/2;font-size:14px;font-weight:700;color:#6b7280;align-self:center;}
  table.dt td:nth-child(2){grid-column:2/3;grid-row:1/2;font-size:14px;}
  table.dt td:nth-child(3){grid-column:3/4;grid-row:1/2;font-size:14px;font-weight:700;color:#047857;text-align:right;align-self:center;}
  table.dt td:nth-child(n+4){grid-column:1/-1;font-size:11px;color:#6b7280;display:flex;justify-content:space-between;}
  table.dt td:last-child{display:none;}

  .bcard div[style*="max-height"]{max-height:none!important;overflow:visible!important;}

  /* Drawers: full screen */
  .drawer-anim{width:100vw!important;max-width:100vw!important;}
  .drawer-anim .px-5{padding-left:14px!important;padding-right:14px!important;}

  /* Activity rail hidden on phones */
  aside.rail{display:none!important;}

  /* Tighter outer padding */
  main .p-4,div.p-4{padding:10px!important;}
  .space-y-4 > *+*{margin-top:10px!important;}

  /* Thermometer goal bar taller */
  .goalbar.tall{height:18px!important;}

  /* Headings down a notch */
  h2.font-display,.font-display.text-\[18px\]{font-size:16px!important;}
  .font-display.text-\[34px\]{font-size:24px!important;}
  .font-display.text-\[28px\]{font-size:22px!important;}
  .font-display.text-\[22px\]{font-size:18px!important;}

  body{padding-bottom:env(safe-area-inset-bottom);}
  .confetti-host{z-index:80;}
}

@media (min-width:640px) and (max-width:1023px){
  .grid.lg\:grid-cols-7{grid-template-columns:repeat(3,minmax(0,1fr))!important;}
  aside.rail{display:none!important;}
}
</style>
</head>
